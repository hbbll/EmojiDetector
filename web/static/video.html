<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video orqali aniqlash - Emotsiya Detektori</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>

<body>

  <div class="container">
    <h1>Video orqali aniqlash</h1>

    <div class="back-link">
      <a href="/"><b>
          Menu</b></a>
    </div>

    <div class="section">
      <p class="hint">Kadrlardan emotsiyalarni aniqlash uchun video faylini yuklang.</p>

      <input type="file" id="videoInput" accept="video/*">

      <div id="videoContainer" class="preview hidden">
        <div class="video-container">
          <video id="videoPlayer"></video>
          <canvas id="videoCanvas"></canvas>
        </div>
      </div>

      <div id="controls" class="hidden" style="margin-top: 20px;">
        <input type="range" id="frameSlider" min="0" value="0" step="0.1" style="width: 100%;">
        <div style="display: flex; justify-content: space-between; margin-top: 10px;">
          <span id="currentTime">0:00</span>
          <div class="button-group">
            <button onclick="prevFrame()">← Oldingi</button>
            <button id="playPauseBtn">Ijro etish</button>
            <button onclick="nextFrame()">Keyingi →</button>
            <button onclick="detectCurrentFrame()">Kadrni aniqlash</button>
            <button onclick="uploadVideo()" class="secondary-btn">To'liq tahlil</button>
          </div>
          <span id="duration">0:00</span>
        </div>
      </div>

      <div id="videoResult"></div>
    </div>
  </div>

  <div id="videoPopup" class="face-popup"></div>

  <script src="/static/utility.js"></script>
  <script src="/static/canvas.js"></script>
  <script src="/static/video-detection.js"></script>
  <script src="/static/app.js"></script>
</body>

</html>
