<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emotion Detector</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>

<body>

  <div class="container">
    <div>
      <h1>Emotion Detection System</h1>

      <p class="hint">
        Tip: paste an image here with <kbd>Ctrl</kbd>+<kbd>V</kbd> (or <kbd>⌘</kbd>+<kbd>V</kbd>), or pick a file.
      </p>

      <input type="file" id="imageInput" accept="image/*">

      <button onclick="uploadImage()">
        Detect Emotion
      </button>

      <div class="preview">
        <img id="preview" />
      </div>
    </div>
    <div>
      <div id="result"></div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>

</html>
